name: Build macOS app

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set release version
        run: |
          VERSION="1.${{ github.run_number }}.0"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i.bak "s/^APP_VERSION = \".*\"/APP_VERSION = \"$VERSION\"/" hustler.py
          rm hustler.py.bak
      - run: bash scripts/build_macos_app.sh
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" dist/Hustler-macOS.zip \
            --title "Hustler $VERSION" \
            --generate-notes
